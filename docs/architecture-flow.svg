<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="t d"><title id="t">LUMINA architecture and user flow</title><desc id="d">The user interacts with the landing page, fortune engine and local storage; GitHub Actions verifies and builds the site.</desc><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#090c2b"/><stop offset="1" stop-color="#171047"/></linearGradient><linearGradient id="gold"><stop stop-color="#ffe0a7"/><stop offset="1" stop-color="#dca64e"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 8 4 0 8z" fill="#f0c77a"/></marker></defs><rect width="1200" height="520" rx="30" fill="url(#bg)"/><g fill="#fff" opacity=".18"><circle cx="80" cy="70" r="2"/><circle cx="1070" cy="90" r="3"/><circle cx="950" cy="430" r="2"/><circle cx="380" cy="55" r="2"/></g><text x="70" y="80" fill="#f0c77a" font-size="18" font-family="sans-serif" letter-spacing="4">LUMINA ARCHITECTURE</text><text x="70" y="120" fill="#fff" font-size="30" font-family="serif">ローカル体験と品質保証の流れ</text><g font-family="sans-serif" text-anchor="middle"><g transform="translate(65 190)"><rect width="180" height="115" rx="20" fill="#18164d" stroke="#8668d8"/><text x="90" y="47" fill="#ffe0a7" font-size="26">USER</text><text x="90" y="77" fill="#bbb6d2" font-size="14">テーマ・任意入力</text></g><g transform="translate(335 190)"><rect width="210" height="115" rx="20" fill="#18164d" stroke="#8668d8"/><text x="105" y="47" fill="#ffe0a7" font-size="25">LANDING PAGE</text><text x="105" y="77" fill="#bbb6d2" font-size="14">HTML / CSS / UI</text></g><g transform="translate(635 190)"><rect width="210" height="115" rx="20" fill="#18164d" stroke="#d7aa62"/><text x="105" y="47" fill="#ffe0a7" font-size="24">FORTUNE ENGINE</text><text x="105" y="77" fill="#bbb6d2" font-size="14"