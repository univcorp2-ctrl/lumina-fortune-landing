name: Generate README design asset

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - public/hero-oracle.svg
      - README.template.md
      - .github/workflows/generate-readme-assets.yml

permissions:
  contents: write

concurrency:
  group: readme-assets-main
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - name: Install SVG renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
      - name: Render GPT Image 2 inspired concept asset
        run: |
          mkdir -p docs/assets
          rsvg-convert --width 1400 --height 1400 public/hero-oracle.svg > docs/assets/generated-readme-hero.png
          cp README.template.md README.md
      - name: Commit generated asset and README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/assets/generated-readme-hero.png
          if git diff --cached --quiet; then
            echo "Generated assets are already current."
            exit 0
          fi
          git commit -m "docs: publish generated design asset and README"
          git push origin HEAD:main
